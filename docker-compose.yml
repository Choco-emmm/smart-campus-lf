services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-smart_lf_db}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    deploy:
      resources:
        limits:
          memory: 1024M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=50
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${DB_PASSWORD:-root}"]
      interval: 10s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD}"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend/smartlf
    expose:
      - "18080"
    volumes:
      - ${SYSTEM_FILE_PREFIX:-uploads_data}:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      SYSTEM_FILE_PREFIX: /app/uploads/
      # 覆盖应用内 localhost:11434 为访问宿主机的 Ollama 实例
      SPRING_AI_OLLAMA_BASE_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend/smartlf
    ports:
      - "80:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
  redis_data:
